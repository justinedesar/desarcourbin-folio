    <!-- GitHub Pages SPA routing: restore path after 404 redirect -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script>
      // TanStack Router base path for GitHub Pages subpath deployment
      window.__VITE_BASE__ = '/desarcourbin-folio/';
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
