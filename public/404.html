<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Desar Courbin</title>
    <script>
      // GitHub Pages SPA routing — redirects all 404s to index.html
      // preserving the path in the query string so the SPA can restore it.
      // pathSegmentsToKeep = 0 for user/org pages (username.github.io)
      // pathSegmentsToKeep = 1 for project pages (username.github.io/repo)
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
</html>
